<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#0d1320"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#5b8cff"/>
      <stop offset="100%" stop-color="#9b6bff"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b8cff"/>
      <stop offset="100%" stop-color="#9b6bff"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5b8cff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#5b8cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9b6bff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#9b6bff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#5b8cff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#5b8cff" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="180" cy="120" r="260" fill="url(#glow1)"/>
  <circle cx="1040" cy="520" r="280" fill="url(#glow2)"/>

  <!-- floating particle nodes + connectors -->
  <g stroke="#5b8cff" stroke-opacity="0.25" stroke-width="1">
    <line x1="90" y1="80" x2="170" y2="150"/>
    <line x1="170" y1="150" x2="120" y2="230"/>
    <line x1="1080" y1="90" x2="1010" y2="160"/>
    <line x1="1010" y1="160" x2="1070" y2="240"/>
    <line x1="60" y1="540" x2="140" y2="480"/>
    <line x1="1130" y1="500" x2="1060" y2="440"/>
  </g>
  <g fill="#5b8cff">
    <circle cx="90" cy="80" r="3.5"/>
    <circle cx="170" cy="150" r="3"/>
    <circle cx="120" cy="230" r="2.5"/>
    <circle cx="60" cy="540" r="3"/>
    <circle cx="140" cy="480" r="2.5"/>
  </g>
  <g fill="#9b6bff">
    <circle cx="1080" cy="90" r="3.5"/>
    <circle cx="1010" cy="160" r="3"/>
    <circle cx="1070" cy="240" r="2.5"/>
    <circle cx="1130" cy="500" r="3"/>
    <circle cx="1060" cy="440" r="2.5"/>
  </g>

  <!-- top label -->
  <text x="100" y="150" font-family="JetBrains Mono, monospace" font-size="18" fill="#5b8cff" letter-spacing="1">// personal portfolio project</text>

  <!-- main title -->
  <text x="98" y="255" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="72" fill="url(#textGrad)" letter-spacing="-1.5">Darakhshan Arshad</text>
  <text x="100" y="312" font-family="Space Grotesk, sans-serif" font-weight="600" font-size="30" fill="#e7ecf7">AI-Inspired Developer Portfolio</text>

  <!-- description -->
  <text x="100" y="358" font-family="Inter, sans-serif" font-size="18" fill="#8b97b3">Responsive portfolio site for a Python developer headed toward AI Agent</text>
  <text x="100" y="384" font-family="Inter, sans-serif" font-size="18" fill="#8b97b3">development — built from scratch with HTML, CSS &amp; JavaScript.</text>

  <!-- tech badges -->
  <g font-family="JetBrains Mono, monospace" font-size="15" fill="#e7ecf7">
    <rect x="100" y="420" width="88" height="38" rx="19" fill="none" stroke="#3d4a66" stroke-width="1"/>
    <text x="124" y="444">HTML5</text>

    <rect x="200" y="420" width="80" height="38" rx="19" fill="none" stroke="#3d4a66" stroke-width="1"/>
    <text x="222" y="444">CSS3</text>

    <rect x="292" y="420" width="148" height="38" rx="19" fill="none" stroke="#3d4a66" stroke-width="1"/>
    <text x="314" y="444">JavaScript</text>

    <rect x="452" y="420" width="150" height="38" rx="19" fill="url(#accentGrad)"/>
    <text x="472" y="444" fill="#ffffff" font-weight="600">No Frameworks</text>
  </g>

  <!-- mock browser window (signature element) -->
  <g filter="url(#cardShadow)">
    <rect x="660" y="120" width="460" height="330" rx="14" fill="#11172480" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="660" y="120" width="460" height="38" rx="14" fill="#ffffff" fill-opacity="0.03"/>
    <rect x="660" y="144" width="460" height="14" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="684" cy="139" r="5" fill="#ff5f57"/>
    <circle cx="704" cy="139" r="5" fill="#febc2e"/>
    <circle cx="724" cy="139" r="5" fill="#28c840"/>
    <text x="752" y="143" font-family="JetBrains Mono, monospace" font-size="12" fill="#8b97b3">portfolio.py</text>

    <text x="690" y="195" font-family="JetBrains Mono, monospace" font-size="14" fill="#9b6bff">class</text>
    <text x="730" y="195" font-family="JetBrains Mono, monospace" font-size="14" fill="#ffb454">Developer:</text>

    <text x="710" y="222" font-family="JetBrains Mono, monospace" font-size="14" fill="#e7ecf7">name = </text>
    <text x="790" y="222" font-family="JetBrains Mono, monospace" font-size="14" fill="#3ddc97">"Darakhshan Arshad"</text>

    <text x="710" y="249" font-family="JetBrains Mono, monospace" font-size="14" fill="#e7ecf7">role = </text>
    <text x="788" y="249" font-family="JetBrains Mono, monospace" font-size="14" fill="#3ddc97">"Python Developer"</text>

    <text x="710" y="276" font-family="JetBrains Mono, monospace" font-size="14" fill="#e7ecf7">goal = </text>
    <text x="785" y="276" font-family="JetBrains Mono, monospace" font-size="14" fill="#3ddc97">"AI Agent Engineer"</text>

    <text x="690" y="312" font-family="JetBrains Mono, monospace" font-size="14" fill="#9b6bff">def</text>
    <text x="722" y="312" font-family="JetBrains Mono, monospace" font-size="14" fill="#5b8cff">build</text>
    <text x="778" y="312" font-family="JetBrains Mono, monospace" font-size="14" fill="#e7ecf7">(self):</text>

    <text x="710" y="339" font-family="JetBrains Mono, monospace" font-size="14" fill="#9b6bff">return</text>
    <text x="778" y="339" font-family="JetBrains Mono, monospace" font-size="14" fill="#3ddc97">"intelligent systems"</text>

    <!-- mini skill bars -->
    <rect x="690" y="380" width="360" height="6" rx="3" fill="#ffffff" fill-opacity="0.06"/>
    <rect x="690" y="380" width="290" height="6" rx="3" fill="url(#accentGrad)"/>
    <rect x="690" y="400" width="360" height="6" rx="3" fill="#ffffff" fill-opacity="0.06"/>
    <rect x="690" y="400" width="190" height="6" rx="3" fill="url(#accentGrad)"/>
  </g>

  <!-- bottom signature line -->
  <text x="100" y="560" font-family="JetBrains Mono, monospace" font-size="15" fill="#5e6a85">$ built with HTML · CSS · JavaScript — no frameworks</text>
</svg>
